version: 2

builds:
  - main: .
    binary: xin-code
    ldflags:
      - -s -w
      - -X main.Version={{.Version}}
      - -X main.Commit={{.ShortCommit}}
      - -X main.Date={{.Date}}
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    env:
      - CGO_ENABLED=0

archives:
  - format_overrides:
      - goos: windows
        format: zip

checksum:
  name_template: 'checksums.txt'

changelog:
  sort: asc
  filters:
    exclude:
      - '^docs:'
      - '^test:'
      - '^chore:'

brews:
  - repository:
      owner: xincode-ai
      name: homebrew-tap
    homepage: https://github.com/xincode-ai/xin-code
    description: "AI-powered terminal coding agent"
    license: MIT
    install: |
      bin.install "xin-code"
    test: |
      system "#{bin}/xin-code", "--version"
