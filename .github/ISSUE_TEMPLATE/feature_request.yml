name: Feature Request
description: Suggest a new feature or improvement
labels: ["enhancement"]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What problem does this solve? Why do you need it?
      placeholder: "I often need to ..."
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Proposed Solution
      description: How do you think it should work?
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives Considered
      description: Other approaches you've thought about

  - type: dropdown
    id: scope
    attributes:
      label: Area
      options:
        - TUI / Interface
        - Tools (Read/Write/Bash/etc.)
        - Provider / Model support
        - Session / History
        - MCP / Plugins / Skills
        - Configuration
        - Other
